<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#875A7B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B4665;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- Clock -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="50" cy="50" r="2" fill="white"/>
  <!-- Hour hand -->
  <line x1="50" y1="50" x2="50" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="50" x2="65" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Plus sign for overtime -->
  <circle cx="75" cy="25" r="12" fill="#28a745"/>
  <line x1="75" y1="19" x2="75" y2="31" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="69" y1="25" x2="81" y2="25" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
